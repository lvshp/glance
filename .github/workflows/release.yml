name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build And Release
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: linux
            goarch: amd64
          - goos: windows
            goarch: amd64
            ext: .exe
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Build archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          binary_name=readcli${{ matrix.ext }}
          GO111MODULE=on go build -o "dist/${binary_name}" -ldflags "-s -w -X main.Version=${VERSION}" ./cmd
          if [ "$GOOS" = "windows" ]; then
            zip -j "dist/readcli-${GOOS}-${GOARCH}-${VERSION}.zip" "dist/${binary_name}"
          else
            tar czf "dist/readcli-${GOOS}-${GOARCH}-${VERSION}.tar.gz" -C dist "${binary_name}"
          fi

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: readcli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/readcli-${{ matrix.goos }}-${{ matrix.goarch }}-${{ github.ref_name }}.*

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build-and-release
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifacts and generate checksums
        run: |
          mkdir -p release
          find dist -name '*.tar.gz' -exec cp {} release/ \;
          find dist -name '*.zip' -exec cp {} release/ \;
          cd release
          sha256sum * > sha256sum.txt

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: |
            release/*.tar.gz
            release/*.zip
            release/sha256sum.txt
